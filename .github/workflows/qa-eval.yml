name: QA Eval
on:
  pull_request:
    paths:
      - 'datasets/**'
      - 'eval_runner.py'
      - 'tests/test_eval_harness.py'
      - 'scripts/**'
      - 'docs/EVALUATION.md'
  push:
    branches: [ main ]
    paths:
      - 'datasets/**'
      - 'eval_runner.py'
      - 'tests/test_eval_harness.py'
      - 'scripts/**'
      - 'docs/EVALUATION.md'
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: bash scripts/qa_eval.sh
